<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control EMPAQUTADORES- Foco Total</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --accent: #3498db;
            --highlight: #e3f2fd; 
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 10px; margin: 0; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.8em; color: #666; margin-bottom: 15px; }

        .config-bar {
            background: white; padding: 10px; border-radius: 8px;
            margin-bottom: 15px; display: flex; flex-wrap: wrap;
            gap: 10px; justify-content: center; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.9em; }
        th { background-color: var(--primary); color: white; padding: 8px; white-space: nowrap; }
        td { border: 1px solid #ddd; padding: 5px; text-align: center; transition: 0.2s; }

        /* AHORA SÍ: Resalta todas las celdas de la fila */
        .fila-resaltada td { 
            background-color: var(--highlight) !important; 
        }

        .col-nombre { display: flex; align-items: center; gap: 5px; justify-content: center; min-width: 130px; }
        .btn-luz { cursor: pointer; font-size: 1.2em; user-select: none; padding: 2px; }
        .input-nombre { border: none; width: 80px; font-weight: bold; outline: none; background: transparent; }

        .dia-celda { cursor: pointer; min-width: 60px; user-select: none; background: white; }
        .presente { background-color: var(--success) !important; color: white; }

        .controles { display: flex; justify-content: center; gap: 4px; margin-top: 4px; }
        .btn-sm { border: none; border-radius: 3px; padding: 4px 10px; cursor: pointer; font-weight: bold; }
        .btn-plus { background: #d4edda; color: #155724; }
        .btn-minus { background: #f8d7da; color: #721c24; }
        .btn-reset { background: var(--danger); color: white; border: none; padding: 5px; border-radius: 4px; cursor: pointer; font-size: 10px; }

        .bandejas-count { font-weight: bold; display: block; font-size: 1.1em; }
        .total-ingreso { font-weight: bold; color: var(--success); }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 20% auto; padding: 20px; border-radius: 8px; width: 80%; max-width: 300px; }
        .modal-content input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; }

        @media print { .config-bar, .controles, .btn-reset, .btn-luz { display: none; } }
    </style>
</head>
<body>

    <h2>Control EMPAQUETADORES</h2>
    <p class="subtitle">💡 Toca el bombillo para resaltar la fila entera</p>

    <div class="config-bar">
        <label><strong>Precio $:</strong> </label>
        <input type="number" id="precioBandeja" value="0.46" step="0.01" style="width: 70px;" oninput="guardarYCalcular()">
        <button onclick="window.print()">Imprimir</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Trabajador</th>
                    <th>Lun</th><th>Mar</th><th>Mié</th><th>Jue</th><th>Vie</th><th>Sáb</th><th>Dom</th>
                    <th>Total $</th>
                    <th>Borrar</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>

    <div id="modalPago" class="modal">
        <div class="modal-content">
            <h3>Datos de Pago</h3>
            <input type="text" id="modalCedula" placeholder="Cédula">
            <input type="text" id="modalBanco" placeholder="Banco">
            <input type="text" id="modalTlf" placeholder="Teléfono">
            <button onclick="guardarDatosPago()" style="background: var(--success); color: white; border: none; padding: 10px; width: 100%; margin-top: 10px;">Guardar</button>
            <button onclick="cerrarModal()" style="background: #ccc; border: none; padding: 5px; width: 100%; margin-top: 5px;">Cerrar</button>
        </div>
    </div>

    <script>
        const cuerpoTabla = document.getElementById('cuerpoTabla');
        const precioInput = document.getElementById('precioBandeja');
        let filaActual = null;

        window.onload = function() {
            const datosGuardados = JSON.parse(localStorage.getItem('mikarol_data')) || {};
            if(datosGuardados.precio) precioInput.value = datosGuardados.precio;
            for (let i = 1; i <= 20; i++) { crearFila(i, datosGuardados[`fila_${i}`]); }
            calcularTodo();
        };

        function crearFila(id, datos = null) {
            const fila = document.createElement('tr');
            fila.id = `fila_${id}`;
            const d = datos || { nombre: '', dias: [0,0,0,0,0,0,0], asistencias: [false,false,false,false,false,false,false], pago: {c:'', b:'', t:''} };
            fila.dataset.pago = JSON.stringify(d.pago);

            let html = `
                <td>
                    <div class="col-nombre">
                        <span class="btn-luz" onclick="resaltarFila(this.closest('tr'))">💡</span>
                        <input type="text" class="input-nombre" value="${d.nombre}" placeholder="Emp ${id}" 
                        oninput="guardarYCalcular()" ondblclick="abrirModal(${id})">
                    </div>
                </td>`;
            
            for (let i = 0; i < 7; i++) {
                html += `
                    <td class="dia-celda ${d.asistencias[i] ? 'presente' : ''}" ondblclick="toggleAsistencia(this)">
                        <span class="bandejas-count">${d.dias[i]}</span>
                        <div class="controles">
                            <button class="btn-sm btn-minus" onclick="cambiarBandejas(this, -1)">-</button>
                            <button class="btn-sm btn-plus" onclick="cambiarBandejas(this, 1)">+</button>
                        </div>
                    </td>`;
            }
            html += `<td class="total-ingreso">$0.00</td>
                     <td><button class="btn-reset" ondblclick="reiniciarFila(${id})">Limpiar</button></td>`;
            fila.innerHTML = html;
            cuerpoTabla.appendChild(fila);
        }

        function resaltarFila(fila) {
            const yaResaltada = fila.classList.contains('fila-resaltada');
            // Quitamos el resaltado de cualquier otra fila antes
            cuerpoTabla.querySelectorAll('tr').forEach(tr => tr.classList.remove('fila-resaltada'));
            // Si no estaba resaltada, la resaltamos
            if (!yaResaltada) {
                fila.classList.add('fila-resaltada');
            }
        }

        function cambiarBandejas(boton, valor) {
            event.stopPropagation();
            const fila = boton.closest('tr');
            const span = boton.closest('.dia-celda').querySelector('.bandejas-count');
            span.innerText = Math.max(0, parseInt(span.innerText) + valor);
            
            // Se apaga el resaltado de toda la fila al terminar
            fila.classList.remove('fila-resaltada');
            
            guardarYCalcular();
        }

        function toggleAsistencia(celda) {
            celda.classList.toggle('presente');
            guardarYCalcular();
        }

        function guardarYCalcular() {
            const dataToSave = { precio: precioInput.value };
            const precio = parseFloat(precioInput.value) || 0;

            cuerpoTabla.querySelectorAll('tr').forEach(fila => {
                const id = fila.id;
                const celdas = fila.querySelectorAll('.dia-celda');
                const rowData = {
                    nombre: fila.querySelector('.input-nombre').value,
                    pago: JSON.parse(fila.dataset.pago),
                    dias: [], asistencias: []
                };

                let totalB = 0;
                celdas.forEach(celda => {
                    const cant = parseInt(celda.querySelector('.bandejas-count').innerText);
                    rowData.dias.push(cant);
                    rowData.asistencias.push(celda.classList.contains('presente'));
                    totalB += cant;
                });
                fila.querySelector('.total-ingreso').innerText = "$" + (totalB * precio).toFixed(2);
                dataToSave[id] = rowData;
            });
            localStorage.setItem('mikarol_data', JSON.stringify(dataToSave));
        }

        function abrirModal(id) {
            filaActual = document.getElementById(`fila_${id}`);
            const info = JSON.parse(filaActual.dataset.pago);
            document.getElementById('modalCedula').value = info.c;
            document.getElementById('modalBanco').value = info.b;
            document.getElementById('modalTlf').value = info.t;
            document.getElementById('modalPago').style.display = 'block';
        }

        function guardarDatosPago() {
            filaActual.dataset.pago = JSON.stringify({
                c: document.getElementById('modalCedula').value,
                b: document.getElementById('modalBanco').value,
                t: document.getElementById('modalTlf').value
            });
            cerrarModal();
            guardarYCalcular();
        }

        function cerrarModal() { document.getElementById('modalPago').style.display = 'none'; }

        function reiniciarFila(id) {
            const fila = document.getElementById(`fila_${id}`);
            fila.querySelectorAll('.dia-celda').forEach(celda => {
                celda.classList.remove('presente');
                celda.querySelector('.bandejas-count').innerText = "0";
            });
            guardarYCalcular();
        }

        function calcularTodo() { guardarYCalcular(); }
    </script>
</body>
</html>
