<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Empaquetadores</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #1e293b;
            --text: #f8fafc;
            --border: #475569;
            --cell-bg: #334155;
            --btn-red: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        h2 { 
            margin: 10px 0; 
            color: var(--primary); 
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-container {
            flex-grow: 1;
            width: 98%;
            height: 80%;
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 800px;
            height: 100%;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid var(--border);
            text-align: center;
            font-size: 0.75rem;
        }

        th {
            background-color: var(--primary);
            color: white;
            padding: 8px 2px;
            font-weight: 600;
            text-transform: uppercase;
        }

        td {
            padding: 2px;
            background-color: #243147;
        }

        .name-input {
            text-align: left;
            padding: 5px;
            font-weight: bold;
            color: #fff;
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
        }

        .total-cell {
            font-weight: bold;
            color: #60a5fa;
            font-size: 0.9rem;
            background-color: #1e293b;
        }

        .btn-plus {
            background-color: transparent;
            color: var(--text);
            border: none;
            cursor: pointer;
            width: 100%;
            height: 100%;
            min-height: 40px;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .count-text {
            color: #fbbf24;
            font-weight: bold;
            font-size: 1rem;
            display: block;
            width: 100%;
            height: 100%;
            line-height: 40px;
            cursor: pointer;
        }

        .btn-row-reset {
            background-color: #475569;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            padding: 5px;
            font-size: 0.7rem;
            width: 90%;
        }

        .btn-row-reset:hover { background-color: #ef4444; }

        .btn-reset {
            background-color: var(--btn-red);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <h2>📦 Registro de Empaquetadores</h2>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 120px;">Nombre</th>
                    <th>Lun</th><th>Mar</th><th>Mié</th><th>Jue</th><th>Vie</th><th>Sáb</th><th>Dom</th>
                    <th style="width: 60px;">Total</th>
                    <th style="width: 40px;">Reset</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>

    <button class="btn-reset" onclick="limpiarTabla()">Limpiar Todo</button>

    <script>
        const numFilas = 9;
        const cuerpoTabla = document.getElementById('cuerpoTabla');

        // Función para guardar todo en LocalStorage
        function guardarDatos() {
            const filasData = [];
            document.querySelectorAll('#cuerpoTabla tr').forEach(tr => {
                const nombre = tr.querySelector('.name-input').value;
                const counts = [];
                tr.querySelectorAll('.count-text').forEach(span => {
                    counts.push({
                        valor: span.innerText,
                        visible: span.style.display !== 'none'
                    });
                });
                filasData.push({ nombre, counts });
            });
            localStorage.setItem('datosEmpaquetadores', JSON.stringify(filasData));
        }

        // Crear la tabla
        for (let i = 0; i < numFilas; i++) {
            const tr = document.createElement('tr');
            
            const tdNombre = document.createElement('td');
            tdNombre.innerHTML = `<input type="text" class="name-input" placeholder="Empleado ${i+1}" oninput="guardarDatos()">`;
            tr.appendChild(tdNombre);
            
            for (let j = 0; j < 7; j++) {
                const tdDia = document.createElement('td');
                tdDia.className = 'day-cell';
                tdDia.innerHTML = `
                    <button class="btn-plus" onclick="incrementar(this)">+</button>
                    <span class="count-text" style="display: none;" onclick="incrementarDesdeNumero(this)">0</span>
                `;
                tr.appendChild(tdDia);
            }
            
            const tdTotal = document.createElement('td');
            tdTotal.className = 'total-cell';
            tdTotal.innerText = '0';
            tr.appendChild(tdTotal);

            const tdAction = document.createElement('td');
            tdAction.innerHTML = `<button class="btn-row-reset" onclick="limpiarFila(this)">↺</button>`;
            tr.appendChild(tdAction);
            
            cuerpoTabla.appendChild(tr);
        }

        // Función para cargar datos al abrir
        function cargarDatos() {
            const storage = localStorage.getItem('datosEmpaquetadores');
            if (!storage) return;
            const data = JSON.parse(storage);
            const trs = document.querySelectorAll('#cuerpoTabla tr');
            
            data.forEach((filaData, i) => {
                if (trs[i]) {
                    trs[i].querySelector('.name-input').value = filaData.nombre;
                    const spans = trs[i].querySelectorAll('.count-text');
                    const btns = trs[i].querySelectorAll('.btn-plus');
                    filaData.counts.forEach((c, j) => {
                        spans[j].innerText = c.valor;
                        if (c.visible) {
                            spans[j].style.display = 'block';
                            btns[j].style.display = 'none';
                        }
                    });
                    actualizarTotalFila(trs[i]);
                }
            });
        }

        function incrementar(btn) {
            const cell = btn.parentNode;
            const span = cell.querySelector('.count-text');
            btn.style.display = 'none';
            span.style.display = 'block';
            sumarUno(span);
        }

        function incrementarDesdeNumero(span) {
            sumarUno(span);
        }

        function sumarUno(span) {
            let valor = parseInt(span.innerText);
            valor++;
            span.innerText = valor;
            actualizarTotalFila(span.closest('tr'));
            guardarDatos(); // Guardar al sumar
        }

        function actualizarTotalFila(row) {
            const counts = row.querySelectorAll('.count-text');
            const totalCell = row.querySelector('.total-cell');
            let suma = 0;
            counts.forEach(s => suma += parseInt(s.innerText));
            totalCell.innerText = suma;
        }

        function limpiarFila(btn) {
            const row = btn.closest('tr');
            row.querySelectorAll('.count-text').forEach(s => {
                s.innerText = '0';
                s.style.display = 'none';
            });
            row.querySelectorAll('.btn-plus').forEach(b => b.style.display = 'flex');
            row.querySelector('.total-cell').innerText = '0';
            guardarDatos(); // Guardar al limpiar fila
        }

        function limpiarTabla() {
            if(confirm("¿Borrar todos los datos de la semana?")) {
                document.querySelectorAll('.btn-row-reset').forEach(btn => limpiarFila(btn));
                document.querySelectorAll('.name-input').forEach(n => n.value = '');
                localStorage.removeItem('datosEmpaquetadores');
            }
        }

        // Cargar al iniciar
        window.onload = cargarDatos;
    </script>
</body>
</html>
